<!DOCTYPE html>
<html>
    <head>
        <title>University Admission Form</title>
    </head>
    <body>
        <h1 style="text-align: center;">University Admission Form</h1>
        <form>
            <fieldset>
                <legend>Personal Information</legend>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required maxlength="100"><br><br>
                <label for="dob">Date of Birth:</label>
                <input type="date" id="dob" name="dob" required><br><br>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required><br><br>
                <label for="phone">Phone:</label>
                <input type="tel" id="phone" name="phone" maxlength="11"><br><br>
                <label for="gender">Gender:</label>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Female</label>
                <input type="radio" id="other" name="gender" value="other">
                <label for="other">Other</label><br><br>
            </fieldset><br>

            <fieldset>
                <legend>Academic Information</legend>
                <label for="dept">Department:</label>
                <select id="dept" name="dept" required>
                    <option value="">Select a department</option>
                    <option value="cse">Computer Science and Engineering (CSE)</option>
                    <option value="eee">Electrical and Electronic Engineering (EEE)</option>
                    <option value="bba">Business Administration (BBA)</option>
                    <option value="english">English</option>
                    <option value="law">Law</option>
                </select><br><br>
                <label for="interest">Interests:</label><br>
                <input type="checkbox" id="programming" name="interest" value="programming">
                <label for="programming">Programming</label><br>
                <input type="checkbox" id="sports" name="interest" value="sports">
                <label for="sports">Sports</label><br>
                <input type="checkbox" id="music" name="interest" value="music">
                <label for="music">Music</label><br>
                <input type="checkbox" id="photography" name="interest" value="photography">
                <label for="photography">Photography</label><br>
            </fieldset><br>

            <fieldset>
                <legend>Document Upload</legend>
                <label for="resume">Resume:</label>
                <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx" required><br><br>
            </fieldset><br>

            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </form>
    </body>
</html>
